<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Epic Nation Lineup — Player roster and M4E scout tool">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='50' fill='%23101010'/><text y='.9em' font-size='70' x='50%' dominant-baseline='middle' text-anchor='middle' font-family='Georgia,serif' fill='%23c9a85c'>E</text></svg>">
<title>Epic Nation Lineup</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=Syne:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --black: #080808;
  --surface: #101010;
  --surface2: #181818;
  --surface3: #222222;
  --gold: #c9a85c;
  --gold-bright: #e8c97a;
  --gold-dim: rgba(201,168,92,0.12);
  --gold-border: rgba(201,168,92,0.28);
  --white: #f0ede8;
  --muted: #888880;
  --dim: #444440;
  --confirmed: #4caf6e;
  --pipeline: #e6a32a;
  --open-border: #555550;
  --serif: 'Playfair Display', Georgia, serif;
  --sans: 'Syne', system-ui, sans-serif;
  --danger: #e05252;
  --blue: #4a90d9;
  --dugout: #0e0e0c;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body { background: var(--black); color: var(--white); font-family: var(--sans); display: flex; flex-direction: column; }
body::after {
  content: ''; position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity: 0.03; pointer-events: none; z-index: 9999;
}

/* ── TOPBAR ── */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; height: 54px;
  border-bottom: 1px solid rgba(201,168,92,0.12);
  background: var(--surface); flex-shrink: 0;
}
.brand { display: flex; align-items: center; gap: 11px; }
.brand-mark { width: 30px; height: 30px; border: 1px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: var(--serif); font-size: 13px; color: var(--gold); }
.brand-name { font-family: var(--serif); font-size: 16px; color: var(--white); }
.brand-tag { font-size: 9px; color: var(--gold); letter-spacing: 0.14em; text-transform: uppercase; margin-left: 5px; opacity: 0.8; }
.topbar-stats { display: flex; gap: 22px; align-items: center; }
.ts { text-align: center; }
.ts-num { font-family: var(--serif); font-size: 17px; line-height: 1; }
.ts-num.gold { color: var(--gold); } .ts-num.green { color: var(--confirmed); } .ts-num.amber { color: var(--pipeline); } .ts-num.gray { color: var(--muted); }
.ts-label { font-size: 9px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px; }
.dv { width: 1px; background: rgba(201,168,92,0.1); height: 24px; }
.live-badge { display: flex; align-items: center; gap: 6px; font-size: 10px; color: var(--confirmed); letter-spacing: 0.1em; text-transform: uppercase; }
.live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--confirmed); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.35} }

/* ── WORKSPACE ── */
.workspace { display: grid; grid-template-columns: 230px 1fr 284px; flex: 1; overflow: hidden; min-height: 0; }

/* ── LEFT SIDEBAR ── */
.sidebar { background: var(--surface); border-right: 1px solid rgba(201,168,92,0.09); display: flex; flex-direction: column; overflow: hidden; }
.sb-head { padding: 14px 18px 10px; flex-shrink: 0; }
.sb-title { font-size: 9px; color: var(--muted); letter-spacing: 0.13em; text-transform: uppercase; margin-bottom: 10px; }
.sb-section { font-size: 9px; color: var(--dim); letter-spacing: 0.1em; text-transform: uppercase; padding: 10px 18px 4px; }
.roster-scroll { flex: 1; overflow-y: auto; padding: 0 10px 14px; }
.roster-scroll::-webkit-scrollbar { width: 3px; }
.roster-scroll::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }
.player-row { display: flex; align-items: center; gap: 9px; padding: 8px 9px; border-radius: 7px; cursor: pointer; transition: background 0.12s; margin-bottom: 2px; }
.player-row:hover { background: var(--surface2); }
.player-row.active { background: var(--gold-dim); }
.slot-num { font-size: 10px; color: var(--dim); width: 16px; flex-shrink: 0; font-weight: 600; text-align: right; }
.p-avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; flex-shrink: 0; }
.av-confirmed { background: rgba(76,175,110,0.14); color: var(--confirmed); border: 1px solid rgba(76,175,110,0.28); }
.av-pipeline  { background: rgba(230,163,42,0.14);  color: var(--pipeline);  border: 1px solid rgba(230,163,42,0.28); }
.av-open      { background: var(--surface3); color: var(--muted); border: 1px solid var(--open-border); }
.av-dugout    { background: rgba(201,168,92,0.1); color: var(--gold); border: 1px solid var(--gold-border); }
.p-info { flex: 1; min-width: 0; }
.p-name { font-size: 11px; font-weight: 500; color: var(--white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.p-pos  { font-size: 10px; color: var(--muted); }
.status-pip { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.pip-c { background: var(--confirmed); } .pip-p { background: var(--pipeline); } .pip-o { background: var(--dim); } .pip-d { background: var(--gold); }
.sidebar-divider { height: 1px; background: rgba(255,255,255,0.04); margin: 8px 12px; }

/* ── MAIN ── */
.main { display: flex; flex-direction: column; overflow: hidden; background: var(--black); }
.main-head { padding: 16px 22px 12px; border-bottom: 1px solid rgba(255,255,255,0.04); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.view-title { font-family: var(--serif); font-size: 19px; font-weight: 400; }
.view-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
.vtabs { display: flex; gap: 4px; }
.vtab { padding: 5px 13px; border-radius: 6px; font-size: 11px; font-weight: 500; cursor: pointer; border: 1px solid transparent; background: none; color: var(--muted); font-family: var(--sans); transition: all 0.12s; letter-spacing: 0.03em; }
.vtab:hover { color: var(--white); }
.vtab.active { border-color: var(--gold-border); color: var(--gold); background: var(--gold-dim); }
.main-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
.main-body::-webkit-scrollbar { width: 4px; }
.main-body::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

/* ── PITCH LAYOUT ── */
.pitch-outer {
  display: flex; gap: 0; align-items: stretch;
  min-height: 520px;
}

/* Dugout — left bench */
.dugout {
  width: 74px; flex-shrink: 0;
  background: var(--dugout);
  border-radius: 10px 0 0 10px;
  border: 1px solid rgba(201,168,92,0.1);
  border-right: none;
  display: flex; flex-direction: column; align-items: center;
  padding: 12px 6px;
  gap: 6px;
  position: relative;
}
.dugout::after {
  content: 'DUGOUT';
  position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%) rotate(-90deg);
  font-size: 7px; color: var(--dim); letter-spacing: 0.18em; white-space: nowrap;
}
.dugout-label { font-size: 7px; color: var(--dim); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 4px; text-align: center; }
.bench-seat {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  cursor: pointer; padding: 6px 4px; border-radius: 7px; transition: background 0.12s; width: 100%;
}
.bench-seat:hover { background: rgba(201,168,92,0.07); }
.bench-seat.active { background: var(--gold-dim); }
.bench-av {
  width: 38px; height: 38px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600;
  background: rgba(201,168,92,0.1); color: var(--gold);
  border: 1px solid var(--gold-border);
  transition: transform 0.13s;
}
.bench-seat:hover .bench-av { transform: scale(1.07); }
.bench-av.open { background: var(--surface3); color: var(--muted); border: 1px dashed var(--dim); }
.bench-name { font-size: 8px; color: var(--white); font-weight: 500; text-align: center; max-width: 58px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bench-role { font-size: 7px; color: var(--gold); letter-spacing: 0.07em; text-transform: uppercase; }
.bench-role.open-role { color: var(--dim); }
.bench-divider { height: 1px; background: rgba(255,255,255,0.04); width: 80%; margin: 2px 0; }

/* The grass pitch */
.pitch-field {
  flex: 1;
  background:
    repeating-linear-gradient(
      180deg,
      #0e1f0e 0px, #0e1f0e 40px,
      #0b1c0b 40px, #0b1c0b 80px
    );
  border: 1px solid rgba(76,175,110,0.15);
  border-left: none; border-right: none;
  padding: 14px 10px;
  position: relative; overflow: hidden;
  display: flex; flex-direction: column;
  justify-content: space-between; gap: 8px;
}

/* Pitch markings */
.pm-halfway { position: absolute; left: 6%; right: 6%; top: 50%; height: 1px; background: rgba(255,255,255,0.06); }
.pm-circle  { position: absolute; left: 50%; top: 50%; width: 80px; height: 80px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.05); transform: translate(-50%,-50%); }
.pm-box-top { position: absolute; left: 22%; right: 22%; top: 0; height: 60px; border: 1px solid rgba(255,255,255,0.045); border-top: none; }
.pm-box-bot { position: absolute; left: 22%; right: 22%; bottom: 0; height: 60px; border: 1px solid rgba(255,255,255,0.045); border-bottom: none; }
.pm-dot-top { position: absolute; left: 50%; top: 55px; width: 4px; height: 4px; border-radius: 50%; background: rgba(255,255,255,0.07); transform: translateX(-50%); }
.pm-dot-bot { position: absolute; left: 50%; bottom: 55px; width: 4px; height: 4px; border-radius: 50%; background: rgba(255,255,255,0.07); transform: translateX(-50%); }
.pm-dot-ctr { position: absolute; left: 50%; top: 50%; width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.08); transform: translate(-50%,-50%); }

.pitch-row { display: flex; justify-content: center; gap: 6px; position: relative; z-index: 2; }
.pitch-slot { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; min-width: 52px; }
.pitch-av {
  width: 44px; height: 44px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600; transition: transform 0.14s;
}
.pitch-slot:hover .pitch-av { transform: scale(1.1); }
.pitch-av.confirmed { background: rgba(76,175,110,0.2); border: 2px solid var(--confirmed); color: var(--confirmed); }
.pitch-av.pipeline  { background: rgba(230,163,42,0.2);  border: 2px solid var(--pipeline);  color: var(--pipeline); }
.pitch-av.open      { background: rgba(255,255,255,0.03); border: 2px dashed var(--dim); color: var(--dim); font-size: 14px; }
.pitch-av.sel       { box-shadow: 0 0 0 3px var(--gold); }
.pitch-pname { font-size: 8px; color: var(--white); font-weight: 500; text-align: center; max-width: 50px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.2; }
.pitch-ppos  { font-size: 7px; color: var(--muted); text-align: center; }

/* Right dugout */
.dugout-right {
  width: 74px; flex-shrink: 0;
  background: var(--dugout);
  border-radius: 0 10px 10px 0;
  border: 1px solid rgba(201,168,92,0.1);
  border-left: none;
  display: flex; flex-direction: column; align-items: center;
  padding: 12px 6px;
  justify-content: center;
  gap: 4px;
}
.dr-label { font-size: 7px; color: var(--dim); letter-spacing: 0.1em; text-transform: uppercase; text-align: center; margin-bottom: 4px; }
.formation-badge {
  background: var(--gold-dim); border: 1px solid var(--gold-border);
  border-radius: 6px; padding: 6px 8px; text-align: center;
}
.formation-num { font-family: var(--serif); font-size: 18px; color: var(--gold); line-height: 1; }
.formation-lbl { font-size: 7px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px; }
.legend-row { display: flex; flex-direction: column; align-items: center; gap: 3px; margin-top: 8px; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 8px; color: var(--muted); }
.legend-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

/* Pitch legend bottom */
.pitch-legend { display: flex; gap: 12px; margin-top: 10px; }
.leg-item { display: flex; align-items: center; gap: 5px; font-size: 9px; color: var(--muted); }
.leg-dot { width: 6px; height: 6px; border-radius: 50%; }

/* CARDS VIEW */
.cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(185px,1fr)); gap: 9px; }
.p-card { background: var(--surface); border: 1px solid rgba(255,255,255,0.05); border-radius: 9px; padding: 14px; cursor: pointer; transition: border-color 0.14s, background 0.14s; }
.p-card:hover { border-color: var(--gold-border); background: var(--surface2); }
.p-card.active { border-color: var(--gold); }
.pc-top { display: flex; align-items: center; gap: 9px; margin-bottom: 10px; }
.pc-av { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; }
.pc-meta { flex: 1; }
.pc-name { font-size: 12px; font-weight: 500; }
.pc-pos  { font-size: 10px; color: var(--muted); }
.sbadge { font-size: 9px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; padding: 2px 7px; border-radius: 20px; }
.sb-confirmed { background: rgba(76,175,110,0.13); color: var(--confirmed); }
.sb-pipeline  { background: rgba(230,163,42,0.13);  color: var(--pipeline); }
.sb-open      { background: rgba(255,255,255,0.04); color: var(--muted); }
.sb-dugout    { background: var(--gold-dim); color: var(--gold); }
.pc-stats { display: flex; gap: 8px; margin-top: 10px; }
.pcs { flex: 1; }
.pcs-v { font-size: 14px; font-weight: 600; font-family: var(--serif); }
.pcs-l { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }

/* SCOUT VIEW */
.scout-search { display: flex; gap: 8px; margin-bottom: 14px; }
.scout-input { flex: 1; background: var(--surface2); border: 1px solid rgba(255,255,255,0.07); border-radius: 7px; padding: 9px 13px; color: var(--white); font-family: var(--sans); font-size: 12px; outline: none; transition: border-color 0.14s; }
.scout-input:focus { border-color: var(--gold-border); }
.scout-input::placeholder { color: var(--dim); }
.scout-btn { padding: 9px 16px; background: var(--gold); color: var(--black); border: none; border-radius: 7px; font-size: 11px; font-weight: 600; cursor: pointer; font-family: var(--sans); letter-spacing: 0.04em; text-transform: uppercase; transition: background 0.12s; white-space: nowrap; }
.scout-btn:hover { background: var(--gold-bright); }
.filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
.fchip { padding: 4px 11px; border-radius: 20px; font-size: 10px; border: 1px solid rgba(255,255,255,0.07); color: var(--muted); cursor: pointer; background: none; font-family: var(--sans); transition: all 0.12s; }
.fchip:hover { border-color: var(--gold-border); color: var(--white); }
.fchip.active { background: var(--gold-dim); border-color: var(--gold-border); color: var(--gold); }
.cand-list { display: flex; flex-direction: column; gap: 9px; }
.cand-card { background: var(--surface); border: 1px solid rgba(255,255,255,0.05); border-radius: 9px; padding: 13px 14px; cursor: pointer; transition: border-color 0.14s; }
.cand-card:hover { border-color: var(--gold-border); }
.cand-top { display: flex; align-items: center; gap: 11px; margin-bottom: 9px; }
.cand-av { width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0; background: var(--surface3); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: var(--gold); border: 1px solid var(--gold-border); }
.cand-main { flex: 1; }
.cand-name { font-size: 13px; font-weight: 500; }
.cand-meta { font-size: 10px; color: var(--muted); }
.fit-val { font-family: var(--serif); font-size: 19px; font-weight: 700; }
.fit-lbl { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
.ctags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 7px; }
.ctag { font-size: 9px; padding: 2px 7px; border-radius: 20px; background: var(--surface3); color: var(--muted); }
.ctag.good { background: rgba(76,175,110,0.1); color: var(--confirmed); }
.ctag.warn { background: rgba(224,82,82,0.1); color: var(--danger); }
.cand-text { font-size: 11px; color: var(--muted); line-height: 1.65; }
.cand-foot { display: flex; gap: 14px; margin-top: 8px; font-size: 10px; color: var(--dim); }
.add-to-btn { margin-top: 9px; width: 100%; padding: 7px; background: var(--gold-dim); border: 1px solid var(--gold-border); border-radius: 6px; color: var(--gold); font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; cursor: pointer; font-family: var(--sans); transition: background 0.12s; }
.add-to-btn:hover { background: rgba(201,168,92,0.22); }
.empty-st { text-align: center; padding: 40px 20px; color: var(--muted); }
.empty-icon { font-size: 32px; margin-bottom: 10px; opacity: 0.35; }
.empty-txt { font-size: 13px; line-height: 1.65; }

/* DETAIL PANEL */
.detail-panel { background: var(--surface); border-left: 1px solid rgba(201,168,92,0.09); display: flex; flex-direction: column; overflow: hidden; }
.det-top { padding: 18px 18px 14px; border-bottom: 1px solid rgba(255,255,255,0.04); flex-shrink: 0; }
.det-header { display: flex; align-items: center; gap: 11px; margin-bottom: 12px; }
.det-av { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 600; }
.det-name { font-family: var(--serif); font-size: 17px; line-height: 1.1; }
.det-sub  { font-size: 11px; color: var(--muted); }
.score-row { display: flex; gap: 7px; }
.score-pill { flex: 1; background: var(--surface2); border-radius: 6px; padding: 7px 8px; text-align: center; }
.score-v { font-size: 16px; font-family: var(--serif); font-weight: 700; }
.score-l { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 1px; }
.det-body { flex: 1; overflow-y: auto; padding: 14px 18px; }
.det-body::-webkit-scrollbar { width: 3px; }
.det-body::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }
.det-sec { margin-bottom: 16px; }
.det-sec-title { font-size: 9px; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 7px; }
.irows .ir { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 11px; }
.irows .ir:last-child { border-bottom: none; }
.ir-lbl { color: var(--muted); }
.ir-val { font-weight: 500; color: var(--white); }
.ir-val.gold { color: var(--gold); } .ir-val.green { color: var(--confirmed); } .ir-val.amber { color: var(--pipeline); }
.reach-wrap { display: flex; flex-direction: column; gap: 5px; }
.reach-r { display: flex; align-items: center; gap: 7px; font-size: 10px; }
.reach-lbl { width: 58px; color: var(--muted); }
.reach-bg { flex: 1; height: 3px; background: var(--surface3); border-radius: 2px; overflow: hidden; }
.reach-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }
.reach-val { width: 28px; text-align: right; font-weight: 500; }
.bl-item { display: flex; align-items: center; gap: 5px; font-size: 10px; margin-bottom: 3px; }
.bl-ok { color: var(--confirmed); } .bl-bad { color: var(--danger); }
.ai-box { background: var(--surface2); border: 1px solid var(--gold-border); border-radius: 7px; padding: 11px 13px; }
.ai-label { font-size: 9px; color: var(--gold); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; display: flex; align-items: center; gap: 5px; }
.ai-dot { width: 5px; height: 5px; background: var(--gold); border-radius: 50%; animation: pulse 2s infinite; }
.ai-text { font-size: 11px; color: var(--white); line-height: 1.7; }
.ai-loading { color: var(--muted); font-style: italic; }
.act-strip { padding: 11px 18px; border-top: 1px solid rgba(255,255,255,0.04); display: flex; gap: 7px; flex-shrink: 0; }
.act-btn { flex: 1; padding: 8px 6px; border-radius: 6px; font-size: 10px; font-weight: 600; cursor: pointer; font-family: var(--sans); letter-spacing: 0.05em; text-transform: uppercase; transition: all 0.12s; border: none; }
.btn-p { background: var(--gold); color: var(--black); }
.btn-p:hover { background: var(--gold-bright); }
.btn-s { background: var(--surface2); color: var(--muted); border: 1px solid rgba(255,255,255,0.07); }
.btn-s:hover { color: var(--white); }
.warn-box { background: rgba(224,82,82,0.06); border: 1px solid rgba(224,82,82,0.2); border-radius: 7px; padding: 10px 12px; }
.warn-label { font-size: 9px; color: var(--danger); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 5px; }
.warn-text { font-size: 11px; color: var(--muted); line-height: 1.65; }

/* ── PLAYER MODAL (add + edit) ── */
.modal-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,0.76);
  z-index: 1000; display: flex; align-items: center; justify-content: center;
  padding: 16px;
}
.modal {
  background: var(--surface); border: 1px solid var(--gold-border);
  border-radius: 12px; padding: 0; width: 440px; max-width: 100%;
  max-height: 90vh; overflow-y: auto; display: flex; flex-direction: column;
  animation: fadeUp 0.18s ease forwards;
}
.modal::-webkit-scrollbar { width: 3px; }
.modal::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }
.modal-header { padding: 22px 24px 16px; border-bottom: 1px solid rgba(255,255,255,0.05); flex-shrink: 0; }
.modal-title { font-family: var(--serif); font-size: 18px; margin-bottom: 3px; }
.modal-sub   { font-size: 11px; color: var(--muted); }
.modal-body  { padding: 18px 24px; flex: 1; }
.modal-footer { padding: 14px 24px; border-top: 1px solid rgba(255,255,255,0.05); display: flex; gap: 8px; flex-shrink: 0; }

/* AI lookup bar */
.ai-lookup-bar { display: flex; gap: 8px; margin-bottom: 16px; }
.ai-lookup-input {
  flex: 1; background: var(--surface2); border: 1px solid var(--gold-border);
  border-radius: 7px; padding: 9px 12px; color: var(--white);
  font-family: var(--sans); font-size: 12px; outline: none;
}
.ai-lookup-input::placeholder { color: var(--dim); }
.ai-lookup-btn {
  padding: 9px 14px; background: var(--gold-dim); border: 1px solid var(--gold-border);
  border-radius: 7px; color: var(--gold); font-size: 11px; font-weight: 600;
  cursor: pointer; font-family: var(--sans); letter-spacing: 0.04em; text-transform: uppercase;
  transition: background 0.12s; white-space: nowrap;
}
.ai-lookup-btn:hover { background: rgba(201,168,92,0.22); }
.ai-lookup-btn:disabled { opacity: 0.4; cursor: default; }

.ai-status { font-size: 11px; color: var(--gold); margin-bottom: 14px; min-height: 16px; display: flex; align-items: center; gap: 6px; }

.section-divider {
  font-size: 9px; color: var(--dim); letter-spacing: 0.12em; text-transform: uppercase;
  margin: 14px 0 10px; display: flex; align-items: center; gap: 8px;
}
.section-divider::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.05); }

.form-row { margin-bottom: 11px; }
.form-label { font-size: 10px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px; display: flex; align-items: center; gap: 5px; }
.ai-filled-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--gold); flex-shrink: 0; }
.form-input, .form-select, .form-textarea {
  width: 100%; background: var(--surface2); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 7px; padding: 8px 11px; color: var(--white);
  font-family: var(--sans); font-size: 12px; outline: none; transition: border-color 0.13s;
}
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--gold-border); }
.form-input.ai-filled { border-color: rgba(201,168,92,0.35); background: rgba(201,168,92,0.06); }
.form-select option { background: var(--surface2); }
.form-textarea { resize: vertical; min-height: 70px; line-height: 1.55; }
.form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

.score-edit-row { display: flex; gap: 8px; }
.score-edit-pill { flex: 1; background: var(--surface2); border-radius: 6px; padding: 7px 8px; text-align: center; }
.score-edit-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
.score-edit-input { width: 100%; background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.1); color: var(--gold); font-family: var(--serif); font-size: 16px; font-weight: 700; text-align: center; outline: none; padding: 2px 0; }
.score-edit-input:focus { border-bottom-color: var(--gold); }

.modal-btn { flex: 1; padding: 9px; border-radius: 7px; font-size: 11px; font-weight: 600; cursor: pointer; font-family: var(--sans); letter-spacing: 0.05em; text-transform: uppercase; border: none; transition: all 0.12s; }
.modal-btn.primary { background: var(--gold); color: var(--black); }
.modal-btn.primary:hover { background: var(--gold-bright); }
.modal-btn.danger  { background: rgba(224,82,82,0.12); color: var(--danger); border: 1px solid rgba(224,82,82,0.25); }
.modal-btn.danger:hover { background: rgba(224,82,82,0.22); }
.modal-btn.cancel  { background: var(--surface2); color: var(--muted); border: 1px solid rgba(255,255,255,0.07); }
.modal-btn.cancel:hover { color: var(--white); }

/* Edit button in detail strip */
.edit-btn { flex:1; padding:8px 6px; border-radius:6px; font-size:10px; font-weight:600; cursor:pointer; font-family:var(--sans); letter-spacing:0.05em; text-transform:uppercase; transition:all 0.12s; background:var(--surface2); color:var(--muted); border:1px solid rgba(255,255,255,0.07); }
.edit-btn:hover { color:var(--white); border-color:var(--gold-border); }

/* ── KEYBOARD SHORTCUTS ── */
.kb-hint {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 12px; z-index: 200; pointer-events: none;
  opacity: 0; transition: opacity 0.3s;
}
.kb-hint.visible { opacity: 1; }
.kb-key {
  display: flex; align-items: center; gap: 6px;
  background: var(--surface2); border: 1px solid var(--gold-border);
  border-radius: 6px; padding: 5px 10px;
  font-size: 10px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase;
}
.kb-key kbd {
  background: var(--surface3); border: 1px solid var(--dim);
  border-radius: 3px; padding: 1px 6px; font-size: 10px;
  color: var(--gold); font-family: var(--sans);
}

/* ── MOBILE LAYOUT ── */
@media (max-width: 860px) {
  .workspace { grid-template-columns: 1fr !important; }
  .sidebar { display: none; }
  .detail-panel { display: none; }
  html, body { overflow: auto; }
  .main { min-height: 100vh; }
  .pitch-outer { flex-direction: column; }
  .dugout { width: 100%; flex-direction: row; border-radius: 10px 10px 0 0; border-right: 1px solid rgba(201,168,92,0.1); border-bottom: none; padding: 10px 16px; justify-content: center; }
  .dugout::after { display: none; }
  .dugout-right { width: 100%; flex-direction: row; justify-content: space-around; border-radius: 0 0 10px 10px; border-left: 1px solid rgba(201,168,92,0.1); border-top: none; padding: 10px 16px; }
  .pitch-field { border-radius: 0; border-left: none; border-right: none; }
  .bench-seat { flex-direction: row; width: auto; padding: 6px 12px; }
  .bench-av { width: 32px; height: 32px; font-size: 11px; }
  .cards-grid { grid-template-columns: 1fr 1fr !important; }
  .topbar { padding: 0 14px; }
}
@media (max-width: 480px) {
  .cards-grid { grid-template-columns: 1fr !important; }
  .pitch-av { width: 36px; height: 36px; font-size: 11px; }
  .pitch-pname { font-size: 7px; max-width: 40px; }
  .main-head { padding: 12px 14px 10px; }
  .main-body { padding: 12px 14px; }
}

/* ── SAVE INDICATOR ── */
.save-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--confirmed); flex-shrink: 0;
  transition: background 0.3s;
}
.save-dot.saving { background: var(--pipeline); animation: pulse 0.8s infinite; }
</style>

// Dugout: Coach, Legend, Captain
const dugout = [
  { id:101, role:'dugout', name:'Open Slot', initials:'+', dugoutRole:'Coach',   status:'open', insight:'The Coach role is a strategic figurehead — a respected former manager or football director who anchors the Epic Nation credibility story with brands and investors.' },
  { id:102, role:'dugout', name:'Open Slot', initials:'+', dugoutRole:'Legend',  status:'open', insight:'The Legend role is a global ambassador — a retired elite player who elevates the Epic Nation brand story. Iconic status and global recognition are key criteria.' },
  { id:103, role:'dugout', name:'Open Slot', initials:'+', dugoutRole:'Captain', status:'open', insight:'The Captain is the internal leader of the Epic 11 — an active player who rallies the squad around the M4E mission and acts as the public face of Epic Nation in the football world.' },
];

// Pitch rows rendered bottom→top. DEF order = LB | CB(Huijsen) | CB(open) | RB
const pitchRows = [
  { label:'GK',  ids:[1] },
  { label:'DEF', ids:[3,2,4,5] },
  { label:'MID', ids:[6,7,8] },
  { label:'ATT', ids:[9,10,11] },
];

let selectedId = 1;
let currentView = 'pitch';
let activeFilters = [];

const allEntries = [...roster, ...dugout];

/* ══════════════════════════════
   SIDEBAR
══════════════════════════════ */
function renderRosterList() {
  let html = '';
  // Field players grouped
  const groups = [
    { label:'Goalkeeper', ids:[1] },
    { label:'Defenders',  ids:[3,2,4,5] },
    { label:'Midfielders',ids:[6,7,8] },
    { label:'Attackers',  ids:[9,10,11] },
  ];
  groups.forEach(g => {
    html += `<div class="sb-section">${g.label}</div>`;
    g.ids.forEach(id => {
      const p = roster.find(r=>r.id===id);
      const avCls = `av-${p.status}`;
      const pipCls = p.status==='confirmed'?'pip-c':p.status==='pipeline'?'pip-p':'pip-o';
      const nm = p.status==='open'?'Open Slot':p.name;
      html += `<div class="player-row${selectedId===id?' active':''}" onclick="selectEntry(${id})">

        <div class="p-info"><div class="p-name">${nm}</div><div class="p-pos">${p.posLabel}</div></div>
        <div class="status-pip ${pipCls}"></div>
      </div>`;
    });
  });
  // Dugout
  html += `<div class="sidebar-divider"></div><div class="sb-section">Dugout</div>`;
  dugout.forEach(d => {
    const avCls = d.status==='open' ? 'av-open' : 'av-dugout';

    html += `<div class="player-row${selectedId===d.id?' active':''}" onclick="selectEntry(${d.id})">

      <div class="status-pip ${pipCls}"></div>
    </div>`;
  });

}

/* ══════════════════════════════
   SELECT
══════════════════════════════ */
function selectEntry(id) {
  selectedId = id;
  renderRosterList();
  renderDetail();
  if (currentView==='pitch') renderPitch();
  if (currentView==='cards') renderCards();
}

/* ══════════════════════════════
   SWITCH VIEW
══════════════════════════════ */
function switchView(view, btn) {
  currentView = view;
  document.querySelectorAll('.vtab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  const titles = { pitch:'Pitch View', cards:'Roster Cards', scout:'Scout — Find Players' };
  const subs   = { pitch:'4·3·3 formation — click any position', cards:'Full squad at a glance', scout:'AI-powered player research & fit scoring' };
  document.getElementById('mainTitle').textContent = titles[view];
  document.getElementById('mainSub').textContent   = subs[view];
  if (view==='pitch') renderPitch();
  else if (view==='cards') renderCards();
  else renderScout();
}

/* ══════════════════════════════
   PITCH VIEW
══════════════════════════════ */
function renderPitch() {
  // Build formation rows
  const rowsHtml = pitchRows.slice().reverse().map(row => {
    const slots = row.ids.map(id => {
      const p = roster.find(r=>r.id===id);
      const sel = p.id===selectedId ? ' sel' : '';
      const shortName = p.status==='open' ? p.pos : p.name.split(' ').slice(-1)[0];
      const clickFn = p.status==='open' ? `openAddModal(${p.id})` : `selectEntry(${p.id})`;
      const hintHtml = p.status==='open' ? `<div class="pitch-ppos" style="color:var(--gold);font-size:7px">+ add</div>` : `<div class="pitch-ppos">${p.pos}</div>`;
      return `<div class="pitch-slot" onclick="${clickFn}">
        <div class="pitch-av ${p.status}${sel}">${p.status==='open'?'+':p.initials}</div>
        <div class="pitch-pname">${shortName}</div>
        ${hintHtml}
      </div>`;
    }).join('');
    return `<div class="pitch-row" style="flex:1;align-items:center">${slots}</div>`;
  }).join('');

  // Dugout seats (left side)
  const dugoutHtml = dugout.map(d => {
    const avCls = d.status==='open' ? 'open' : '';
    const roleLbl = d.dugoutRole;
    const nm = d.status==='open' ? '?' : d.initials;
    const nameTxt = d.status==='open' ? 'Open' : d.name.split(' ').slice(-1)[0];
    return `<div class="bench-seat${selectedId===d.id?' active':''}" onclick="selectEntry(${d.id})">
      <div class="bench-av ${avCls}">${nm}</div>
      <div class="bench-name">${nameTxt}</div>
      <div class="bench-role${d.status==='open'?' open-role':''}">${roleLbl}</div>
    </div>`;
  }).join('<div class="bench-divider"></div>');

  document.getElementById('mainBody').innerHTML = `<div class="fade-up">
    <div class="pitch-outer">

function callAI(prompt, fallbackId) {
  const el = document.getElementById('aiInsight');
  if (!el) return;
  el.innerHTML = `<span class="spinner"></span><span class="ai-loading">Thinking…</span>`;
  fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:1000, messages:[{role:'user',content:prompt}] })
  })
  .then(r=>r.json())
  .then(data=>{ el.textContent = data.content?.find(c=>c.type==='text')?.text || 'Unavailable.'; })
  .catch(()=>{ const e = allEntries.find(x=>x.id===fallbackId); if(el&&e) el.textContent=e.insight; });
}

  const p = roster.find(r=>r.id===id);

  callAI(`You are the Epic Nation M4E Scout AI. Analyse this player for Media-for-Equity deal potential:

function genMemo(id) {

  callAI(`You are the Epic Nation deal desk. Write a concise internal deal memo:

/* ─── AI LOOKUP — three sequential web searches, then structure ───
   Architecture: run 3 separate search+loop calls to gather raw verified facts,
   then a final call to structure those facts into JSON.
   The model cannot hallucinate facts it does not have — only the search results are used.
*/
async function runSearchRound(query, systemMsg) {
  const tools = [{ type: 'web_search_20250305', name: 'web_search' }];
  let messages = [{ role: 'user', content: query }];
  for (let round = 0; round < 5; round++) {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 600, tools, system: systemMsg, messages })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    messages.push({ role: 'assistant', content: data.content });
    if (data.stop_reason === 'tool_use') {
      const results = data.content.filter(b => b.type === 'tool_use').map(b => ({ type: 'tool_result', tool_use_id: b.id, content: '' }));
      messages.push({ role: 'user', content: results });
      continue;
    }
    if (data.stop_reason === 'end_turn') {
      return data.content.filter(b => b.type === 'text').pop()?.text || '';
    }
  }
  return '';
}

async function runAILookup() {
  const nameInput = document.getElementById('ai-search-name');
  const name = nameInput?.value.trim();
  if (!name) { nameInput.style.borderColor = 'var(--danger)'; return; }

  const btn    = document.getElementById('ai-lookup-btn');
  const status = document.getElementById('ai-status');
  if (btn) btn.disabled = true;

  const p = roster.find(r => r.id === modalTargetId);
  const posCtx = p ? `(${p.posLabel}, ${p.pos})` : '';
  const searchSys = 'You are a football researcher. Search and return a concise factual summary of what you find. Be specific — include exact numbers, club names, dates. Max 5 sentences.';

  try {
    if (status) status.innerHTML = `<span class="spinner"></span> Searching current club & transfer status…`;
    const clubFacts = await runSearchRound(
      `${name} footballer current club 2025 2026 transfer`,
      searchSys
    );

    if (status) status.innerHTML = `<span class="spinner"></span> Searching social media following…`;
    const socialFacts = await runSearchRound(
      `${name} footballer Instagram followers 2025 social media`,
      searchSys
    );

    if (status) status.innerHTML = `<span class="spinner"></span> Searching nationality, image rights, deals…`;
    const dealFacts = await runSearchRound(
      `${name} footballer nationality image rights commercial deals sponsors`,
      searchSys
    );

    const allFacts = `CLUB/TRANSFER FACTS:
${clubFacts}

SOCIAL MEDIA FACTS:
${socialFacts}

NATIONALITY/RIGHTS/DEALS:
${dealFacts}`;

    if (status) status.innerHTML = `<span class="spinner"></span> Building verified profile…`;

    const structRes = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 700,
        system: `You are an M4E analyst for Epic Nation (Dubai sports agency). Structure the provided verified search facts into a player profile JSON.
RULES: Only use facts from the search results. If something is not in the results, use "TBC". Do not invent numbers.
Epic Nation brands: Hydroshot, Nothing (tech), Zeekr (EV), Strava, Applied Nutrition, Lumin (skincare), Hyperice (recovery), Horizn Studios (travel).
Scores /100: fScore=M4E fit, bScore=brand appeal, dScore=deal readiness.
Return ONLY raw JSON, no markdown, no text outside the JSON object.`,
        messages: [{
          role: 'user',
          content: `Player: "${name}" ${posCtx}

Verified search results:
${allFacts}

Return ONLY this JSON:
{"name":"","club":"","nat":"","followers":"","eng":"","rights":"TBC","fScore":0,"bScore":0,"dScore":0,"insight":""}`
        }]
      })
    });

    const structData = await structRes.json();
    if (structData.error) throw new Error(structData.error.message);

    let raw = (structData.content?.find(b => b.type === 'text')?.text || '').trim()
      .replace(/^```json\s*/i, '').replace(/^```/, '').replace(/```$/, '').trim();

    let parsed;
    try { parsed = JSON.parse(raw); }
    catch { const m = raw.match(/\{[\s\S]*\}/); parsed = m ? JSON.parse(m[0]) : null; }
    if (!parsed) throw new Error('JSON parse failed');

    applyAIData(parsed);
    if (status) status.innerHTML = `<span style="color:var(--confirmed)">✓</span> Profile built from 3 live web searches — edit any field before saving`;
    if (btn) btn.disabled = false;

  } catch(err) {
    console.error('Lookup error:', err);
    if (status) status.innerHTML = `<span style="color:var(--danger)">⚠ ${err.message} — fill fields manually</span>`;
    if (btn) btn.disabled = false;
  }
}

function applyAIData(d) {
  const fields = ['name','club','nat','followers','eng'];
  fields.forEach(f => {
    const el = document.getElementById(`ap-${f==='followers'?'followers':f==='eng'?'eng':f}`);
    if (el && d[f]) { el.value = d[f]; el.classList.add('ai-filled'); }
  });
  if (d.rights) {
    const sel = document.getElementById('ap-rights');
    if (sel) { for(let o of sel.options) if(o.value===d.rights) o.selected=true; }
  }
  if (d.fScore) { const el=document.getElementById('ap-fscore'); if(el){el.value=d.fScore;el.classList.add('ai-filled');} }
  if (d.bScore) { const el=document.getElementById('ap-bscore'); if(el){el.value=d.bScore;el.classList.add('ai-filled');} }
  if (d.dScore) { const el=document.getElementById('ap-dscore'); if(el){el.value=d.dScore;el.classList.add('ai-filled');} }
  if (d.insight) { const el=document.getElementById('ap-insight'); if(el){el.value=d.insight;el.classList.add('ai-filled');} }
  // gold dots on labels
  document.querySelectorAll('[id^="lbl-"]').forEach(dot=>{
    dot.className='ai-filled-dot';
  });
}

function submitModal(mode, id) {
  const name      = document.getElementById('ap-name')?.value.trim();
  const club      = document.getElementById('ap-club')?.value.trim() || '—';
  const nat       = document.getElementById('ap-nat')?.value.trim() || '—';
  const followers = document.getElementById('ap-followers')?.value.trim() || '—';
  const eng       = document.getElementById('ap-eng')?.value.trim() || '—';
  const rights    = document.getElementById('ap-rights')?.value || 'TBC';
  const status    = document.getElementById('ap-status')?.value || 'pipeline';
  const insight   = document.getElementById('ap-insight')?.value.trim() || '';
  const fScore    = parseInt(document.getElementById('ap-fscore')?.value) || Math.floor(Math.random()*14+68);
  const bScore    = parseInt(document.getElementById('ap-bscore')?.value) || Math.floor(Math.random()*12+64);
  const dScore    = parseInt(document.getElementById('ap-dscore')?.value) || Math.floor(Math.random()*12+62);

  if (!name) { const n=document.getElementById('ap-name'); if(n){n.style.borderColor='var(--danger)';n.focus();} return; }

  const p = allEntries.find(e=>e.id===id);
  if (!p) return;

  p.name      = name;
  p.initials  = name.split(' ').filter(Boolean).map(w=>w[0].toUpperCase()).join('').slice(0,2);
  p.club      = club;
  p.nat       = nat;
  p.followers = followers;
  p.eng       = eng;
  p.rights    = rights;
  p.status    = status;
  p.fScore    = Math.min(100,Math.max(0,fScore));
  p.bScore    = Math.min(100,Math.max(0,bScore));
  p.dScore    = Math.min(100,Math.max(0,dScore));
  p.blockers  = [];
  p.insight   = insight || `Recently ${mode==='edit'?'updated':'added'}. Outreach via Shajan at Epic Sports Group. Image rights (${rights}) to be confirmed.`;
  if (!p.rInsta) { p.rInsta=Math.floor(Math.random()*28+55); p.rYT=Math.floor(Math.random()*25+34); p.rTW=Math.floor(Math.random()*22+38); }

  closeModal();
  selectedId = p.id;
  updateStats();
  renderRosterList();
  if (currentView==='pitch') renderPitch();
  if (currentView==='cards') renderCards();
  renderDetail();
  showToast(mode==='edit' ? p.name + ' updated' : p.name + ' added to lineup', 'success');
}

function removePlayer(id) {
  const p = roster.find(r=>r.id===id);
  if (!p) return;
  if (!confirm(`Remove ${p.name} from the lineup?`)) return;
  p.name='Open Slot'; p.initials='+'; p.club='—'; p.nat='—';
  p.followers='—'; p.eng='—'; p.status='open'; p.rights='—';
  p.fScore=0; p.bScore=0; p.dScore=0; p.rInsta=0; p.rYT=0; p.rTW=0;
  p.blockers=[]; p.insight=`Open slot. Use the Scout tab or click this position to add a player.`;
  closeModal();
  selectedId = p.id;
  updateStats();
  renderRosterList();
  if (currentView==='pitch') renderPitch();
  if (currentView==='cards') renderCards();
  renderDetail();
  showToast(p.name + ' removed from lineup', 'error');
}


/* ── TOAST NOTIFICATIONS ── */
function showToast(msg, type) {
  const t = document.createElement('div');
  const bg = type === 'success' ? 'var(--confirmed)' : type === 'error' ? 'var(--danger)' : 'var(--gold)';
  t.style.cssText = 'position:fixed;bottom:28px;right:28px;z-index:9998;background:var(--surface);border:1px solid ' + bg + ';color:var(--white);padding:12px 18px;border-radius:8px;font-size:12px;font-family:var(--sans);letter-spacing:0.04em;box-shadow:0 4px 24px rgba(0,0,0,0.4);opacity:0;transform:translateY(8px);transition:all 0.2s;max-width:280px;line-height:1.5';
  t.innerHTML = '<span style="color:' + bg + ';margin-right:8px">' + (type==='success'?'✓':type==='error'?'✗':'●') + '</span>' + msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity='1'; t.style.transform='translateY(0)'; }, 10);
  setTimeout(() => { t.style.opacity='0'; t.style.transform='translateY(8px)'; setTimeout(()=>t.remove(),200); }, 3200);
}



/* ══════════════════════════════
   LOCALSTORAGE PERSISTENCE
══════════════════════════════ */
const SAVE_KEY = 'epic22_lineup_v1';

function saveRoster() {
  const saveDot = document.getElementById('saveDot');
  if (saveDot) saveDot.className = 'save-dot saving';
  try {
    const data = roster.map(p => ({
      id: p.id, name: p.name, initials: p.initials,
      club: p.club, nat: p.nat, pos: p.pos, posLabel: p.posLabel,
      status: p.status, followers: p.followers, eng: p.eng,
      fScore: p.fScore, bScore: p.bScore, dScore: p.dScore,
      rights: p.rights, blockers: p.blockers,
      rInsta: p.rInsta, rYT: p.rYT, rTW: p.rTW,
      insight: p.insight, sensitivity: p.sensitivity
    }));
    const dugoutData = dugout.map(d => ({
      id: d.id, name: d.name, initials: d.initials,
      dugoutRole: d.dugoutRole, status: d.status, insight: d.insight
    }));
    localStorage.setItem(SAVE_KEY, JSON.stringify({ roster: data, dugout: dugoutData, ts: Date.now() }));
    setTimeout(() => {
      if (saveDot) saveDot.className = 'save-dot';
    }, 600);
  } catch(e) { console.warn('Save failed:', e); }
}

function loadRoster() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return false;
    const saved = JSON.parse(raw);
    if (!saved.roster) return false;
    saved.roster.forEach(savedP => {
      const p = roster.find(r => r.id === savedP.id);
      if (p) Object.assign(p, savedP);
    });
    if (saved.dugout) {
      saved.dugout.forEach(savedD => {
        const d = dugout.find(x => x.id === savedD.id);
        if (d) Object.assign(d, savedD);
      });
    }
    return true;
  } catch(e) { console.warn('Load failed:', e); return false; }
}

function clearSavedRoster() {
  localStorage.removeItem(SAVE_KEY);
  showToast('Roster reset to defaults', 'warn');
  location.reload();
}

/* Hook saveRoster into all mutation points */
const _origSubmitModal = submitModal;
window.submitModal = function(mode, id) {
  _origSubmitModal(mode, id);
  saveRoster();
};
const _origRemovePlayer = removePlayer;
window.removePlayer = function(id) {
  _origRemovePlayer(id);
  saveRoster();
};
const _origAddCandidate = addCandidate;
window.addCandidate = function(name, pos, club, followers, eng) {
  _origAddCandidate(name, pos, club, followers, eng);
  saveRoster();
};

let kbHintTimeout;
document.addEventListener('keydown', function(e) {
  // Don't fire if typing in an input/textarea/modal
  const tag = document.activeElement?.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
  if (document.getElementById('playerModal')) return;

  const hint = document.getElementById('kbHint');

  switch(e.key.toLowerCase()) {
    case 'p':
      e.preventDefault();
      document.querySelector('.vtab:nth-child(1)')?.click();
      break;
    case 'c':
      e.preventDefault();
      document.querySelector('.vtab:nth-child(2)')?.click();
      break;
    case 's':
      e.preventDefault();
      document.querySelector('.vtab:nth-child(3)')?.click();
      break;
    case 'escape':
      closeModal();
      break;
    case '?':
      if (hint) {
        hint.classList.add('visible');
        clearTimeout(kbHintTimeout);
        kbHintTimeout = setTimeout(() => hint.classList.remove('visible'), 3000);
      }
      break;
  }
});
