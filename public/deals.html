<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deal Scorecard — Epic 22</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Syne:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --gold: #c8a96e; --gold-border: rgba(200,169,110,0.22); --black: #06060a; --white: #f2efe9; --muted: #7a7870; --serif: 'Cormorant Garamond', Georgia, serif; --sans: 'Syne', system-ui, sans-serif; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--black); color: var(--white); font-family: var(--sans); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 48px; }
  .mark { width: 56px; height: 56px; border: 1px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: var(--serif); font-size: 22px; color: var(--gold); margin: 0 auto 32px; }
  h1 { font-family: var(--serif); font-size: 48px; font-weight: 300; color: var(--white); margin-bottom: 12px; }
  h1 em { font-style: italic; color: var(--gold); }
  p { font-size: 13px; color: var(--muted); line-height: 1.8; max-width: 400px; margin: 0 auto 40px; }
  a { display: inline-flex; align-items: center; gap: 8px; font-size: 11px; color: var(--gold); letter-spacing: 0.12em; text-transform: uppercase; text-decoration: none; border: 1px solid var(--gold-border); padding: 12px 24px; border-radius: 6px; transition: background 0.15s; }
  a:hover { background: rgba(200,169,110,0.1); }
</style>
</head>
<body>
  <div class="mark">E</div>
  <h1>Deal <em>Scorecard</em></h1>
  <p>The M4E deal assessment engine is being migrated to this platform. Drop in the deals.html file to your deployment to activate it.</p>
  <a href="/">← Back to Platform</a>
</body>
</html>
